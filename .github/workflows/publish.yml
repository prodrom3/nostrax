name: Publish to PyPI

# Two ways to run:
#   * Push a version tag (vX.Y.Z)  -> builds and publishes to PyPI.
#   * Run manually (workflow_dispatch) -> choose testpypi (default) or pypi;
#     use this to dry-run the whole pipeline against TestPyPI first.
#
# Publishing uses PyPI Trusted Publishing (OIDC) - no API tokens are stored.
# One-time setup (per registry): add a trusted publisher for this repo
# pointing at this workflow (publish.yml) and the matching environment
# (pypi / testpypi) on pypi.org and/or test.pypi.org.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Registry to publish to"
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    # 'testpypi' only for a manual dry-run targeting TestPyPI; 'pypi' otherwise.
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Empty repository-url publishes to real PyPI; the TestPyPI URL is
          # used only for a manual dry-run.
          repository-url: ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi') && 'https://test.pypi.org/legacy/' || '' }}
          # Don't fail if a version was already uploaded (e.g. a tag push
          # re-running after a manual publish of the same version).
          skip-existing: true
