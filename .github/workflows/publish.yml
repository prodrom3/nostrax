name: Publish to PyPI

# Real PyPI publishing is constrained to a single path: pushing a version
# tag (vX.Y.Z), which runs in the protected `pypi` environment.
# workflow_dispatch is a dry-run only and always targets TestPyPI, so a
# manual run can never publish to real PyPI.
#
# Publishing uses PyPI Trusted Publishing (OIDC) - no API tokens are stored.
# One-time PyPI setup (do this to fully lock it down): configure the trusted
# publisher for this repo with workflow = publish.yml AND environment = pypi,
# so a token is only issued to jobs running in that environment. Configure a
# separate testpypi trusted publisher (environment = testpypi) for dry runs.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    # A tag push publishes to real PyPI (protected `pypi` environment); any
    # other trigger (workflow_dispatch) is a TestPyPI dry run.
    environment: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && 'pypi' || 'testpypi' }}
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Empty repository-url publishes to real PyPI (tag push only); every
          # other trigger publishes to TestPyPI.
          repository-url: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) && '' || 'https://test.pypi.org/legacy/' }}
          # Don't fail if a version was already uploaded (re-run of a tag).
          skip-existing: true
