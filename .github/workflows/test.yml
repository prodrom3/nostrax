name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check nostrax/ tests/ examples/
      - name: Format check (ruff)
        run: ruff format --check nostrax/ tests/ examples/
      - name: Type-check (mypy)
        run: mypy

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        include:
          # Python 3.14 runs on Linux only; macOS and Windows binaries
          # lag for the newest interpreter.
          - os: ubuntu-latest
            python-version: '3.14'
          # Exercise both the oldest (tomli backport, older asyncio) and a
          # current interpreter on macOS and Windows so platform-specific
          # path/encoding/event-loop breakage is caught, not just 3.13.
          - os: macos-latest
            python-version: '3.10'
          - os: macos-latest
            python-version: '3.13'
          - os: windows-latest
            python-version: '3.10'
          - os: windows-latest
            python-version: '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests with coverage
        run: >-
          python -m pytest --tb=short -q
          --cov=nostrax --cov-report=term-missing --cov-fail-under=85

      - name: Smoke-test the CLI entry point
        run: nostrax --version
